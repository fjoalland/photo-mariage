<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Galerie des souvenirs</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-1:    #f6efe3;
    --bg-2:    #ede2cf;
    --paper:   #fdfaf3;
    --ink:     #3b342c;
    --ink-2:   #6b5e51;
    --muted:   #a89684;
    --accent:  #b48a55;
    --accent-d:#8a6334;
    --line:    #d9c9b1;
    --border:  #e7dbc6;
    --error:   #b96b62;
    --radius:  14px;
    --shadow:  0 1px 0 rgba(0,0,0,.02), 0 18px 44px -24px rgba(80,55,25,.28);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Jost', system-ui, -apple-system, sans-serif;
    --hand:  'Caveat', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(1100px 600px at 50% -8%, #fff8ea 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding:
      env(safe-area-inset-top)
      max(16px, env(safe-area-inset-right))
      env(safe-area-inset-bottom)
      max(16px, env(safe-area-inset-left));
    overflow-x: hidden;
  }

  /* Grain papier subtil */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.45  0 0 0 0 0.36  0 0 0 0 0.25  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: .5; mix-blend-mode: multiply; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 1080px; margin: 0 auto;
    padding: 34px 0 56px;
  }

  /* ---------- En-tête ---------- */
  header {
    text-align: center;
    margin-bottom: 28px;
    animation: rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-bottom: 14px; color: var(--accent);
  }
  .ornament::before, .ornament::after {
    content: ""; display: block; height: 1px; width: 38px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
  }
  .ornament-mark { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; }
  .monogram {
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: 17px; letter-spacing: 2px; color: var(--ink-2); margin-bottom: 8px;
  }
  h1 {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(34px, 9vw, 52px); line-height: 1; color: var(--ink);
    letter-spacing: -.01em;
  }
  h1 .amp { font-style: italic; color: var(--accent-d); margin: 0 .1em; }
  .date {
    margin-top: 14px; font-size: 12px; letter-spacing: 4px;
    color: var(--ink-2); text-transform: uppercase;
  }
  .date .dot {
    display: inline-block; width: 3px; height: 3px; border-radius: 50%;
    background: var(--accent); vertical-align: middle; margin: 0 8px 2px;
  }

  /* Compteur typographique */
  .counter-wrap {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 22px;
    min-height: 60px;
  }
  .counter {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-2);
    font-size: 16px;
    letter-spacing: .2px;
    opacity: 0; transition: opacity .35s ease;
  }
  .counter.show { opacity: 1; }
  .counter strong {
    font-family: var(--serif);
    font-style: normal;
    font-weight: 500;
    color: var(--accent-d);
    font-size: 22px;
    margin-right: 4px;
    vertical-align: -1px;
  }

  /* Actions */
  .actions {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-top: 18px;
  }
  .lnk {
    font: inherit; font-size: 13px; letter-spacing: .4px; cursor: pointer;
    color: var(--accent-d); background: var(--paper);
    border: 1px solid var(--line); border-radius: 999px; padding: 10px 20px;
    text-decoration: none; transition: background .15s, border-color .15s, transform .1s, box-shadow .2s;
    display: inline-flex; align-items: center; gap: 8px;
    min-height: 40px;
  }
  .lnk:hover { background: #fff; border-color: var(--accent); transform: translateY(-1px); }
  .lnk:active { transform: translateY(0); }
  .lnk.solid {
    background: var(--accent-d); color: #fff; border-color: var(--accent-d);
    box-shadow: 0 8px 22px -10px color-mix(in srgb, var(--accent-d) 70%, transparent);
  }
  .lnk.solid:hover { filter: brightness(1.08); background: var(--accent-d); }
  .lnk .ic {
    font-family: var(--serif); font-style: italic; font-size: 17px;
    line-height: 1; transform: translateY(-1px);
  }
  .lnk.refresh.spinning .ic { animation: spin 1s linear infinite; transform-origin: center; }

  /* ---------- États ---------- */
  .state {
    text-align: center; padding: 70px 16px;
    color: var(--ink-2);
    font-family: var(--serif); font-size: 22px; font-style: italic;
    animation: fade .4s ease both;
  }
  .state.hidden { display: none; }
  .state .small {
    display: block; font-family: var(--sans); font-style: normal;
    font-size: 14px; margin-top: 8px; color: var(--muted); letter-spacing: .3px;
  }
  .state .empty-mark {
    display: inline-flex; width: 64px; height: 64px; margin-bottom: 18px;
    align-items: center; justify-content: center;
    border-radius: 50%; border: 1px solid var(--line);
    color: var(--accent);
    font-family: var(--serif); font-size: 30px; font-style: italic;
    background: var(--paper);
  }
  .state .empty-mark svg { width: 28px; height: 28px; stroke-width: 1.4; }
  .spin-circle {
    width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 18px;
    border: 2.5px solid var(--line); border-top-color: var(--accent-d);
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Mosaïque (colonnes round-robin pour un équilibre G/D) ---------- */
  .grid {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  @media (min-width: 620px) { .grid { gap: 14px; } }
  @media (min-width: 920px) { .grid { gap: 16px; } }
  .grid.hidden { display: none; }
  .grid .col {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  @media (min-width: 620px) { .grid .col { gap: 14px; } }
  @media (min-width: 920px) { .grid .col { gap: 16px; } }

  .tile {
    position: relative;
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    background: linear-gradient(135deg, #efe6d6 0%, #e5d9c2 100%);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: block; width: 100%;
    opacity: 0; transform: translateY(10px);
    animation: tileIn .55s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes tileIn {
    to { opacity: 1; transform: translateY(0); }
  }
  /* Skeleton shimmer pendant chargement de l'image */
  .tile:not(.loaded)::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%);
    background-size: 220% 100%;
    animation: shimmer 1.4s linear infinite;
  }
  @keyframes shimmer { from { background-position: 220% 0; } to { background-position: -120% 0; } }
  .tile:not(.loaded) { min-height: 140px; }

  .tile img {
    width: 100%; display: block; background: transparent;
    opacity: 0; transition: opacity .5s ease, transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .tile.loaded img { opacity: 1; }
  .tile:hover img { transform: scale(1.025); }

  /* Voile au survol pour signifier l'ouverture */
  .tile::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(40,30,20,.35) 100%);
    opacity: 0; transition: opacity .25s ease;
    pointer-events: none;
  }
  .tile:hover::after { opacity: 1; }

  /* Bouton télécharger sur chaque vignette */
  .tile .dl {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(40,30,20,.6); color: #fff;
    text-decoration: none; backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,.08);
    opacity: 0; transform: translateY(-4px) scale(.9);
    transition: opacity .18s, transform .18s, background .15s;
  }
  .tile:hover .dl, .tile:focus-within .dl { opacity: 1; transform: none; }
  .tile .dl:hover { background: rgba(40,30,20,.85); }
  .tile .dl svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  @media (hover: none) {
    .tile .dl { opacity: .92; transform: none; }
  }

  /* Repli si la miniature ne peut pas être chargée */
  .tile .fb {
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-family: var(--serif); font-style: italic; font-size: 14px;
  }

  /* ---------- Lightbox ---------- */
  .lb {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(28,22,16,.94);
    backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 20px;
    animation: lbIn .25s ease;
  }
  @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
  .lb.open { display: flex; }
  .lb-media {
    max-width: 94vw; max-height: 84vh; display: flex;
    touch-action: pan-y;
  }
  .lb-media img {
    max-width: 94vw; max-height: 84vh; object-fit: contain;
    border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    user-select: none; -webkit-user-drag: none;
    animation: lbFade .35s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes lbFade { from { opacity: 0; transform: scale(.985); } to { opacity: 1; transform: scale(1); } }

  /* Barre supérieure de la lightbox */
  .lb-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, transparent 100%);
    pointer-events: none;
  }
  .lb-top > * { pointer-events: auto; }
  .lb-counter {
    font-family: var(--serif); font-style: italic;
    color: rgba(255,255,255,.85); font-size: 17px;
    letter-spacing: .3px;
  }
  .lb-counter .total { color: rgba(255,255,255,.55); }
  .lb-close {
    width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.14); color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .15s;
  }
  .lb-close:hover { background: rgba(255,255,255,.28); transform: scale(1.05); }

  /* Boutons de navigation */
  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,.12); color: #fff; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .15s;
    backdrop-filter: blur(4px);
  }
  .lb-btn:hover { background: rgba(255,255,255,.28); }
  .lb-prev { left: 14px; }
  .lb-next { right: 14px; }
  @media (max-width: 560px) {
    .lb-btn { width: 40px; height: 40px; font-size: 20px; }
    .lb-prev { left: 6px; } .lb-next { right: 6px; }
  }

  /* Barre inférieure (téléchargement) */
  .lb-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 16px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex; justify-content: center;
    pointer-events: none;
    background: linear-gradient(0deg, rgba(0,0,0,.55) 0%, transparent 100%);
  }
  .lb-bottom > * { pointer-events: auto; }
  .lb-dl {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px; border-radius: 999px;
    background: rgba(255,255,255,.92);
    color: #2b231d;
    font: inherit; font-size: 14px; letter-spacing: .3px; font-weight: 500;
    text-decoration: none;
    transition: background .15s, transform .12s, box-shadow .2s;
    box-shadow: 0 8px 22px -8px rgba(0,0,0,.4);
  }
  .lb-dl:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 12px 26px -8px rgba(0,0,0,.5); }
  .lb-dl svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ---------- Pied ---------- */
  footer {
    text-align: center; margin-top: 40px;
    padding-top: 22px; border-top: 1px solid var(--line);
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted);
  }
  footer .foot-ornament { color: var(--accent); margin: 0 6px; letter-spacing: 0; font-family: var(--serif); }

  /* ---------- Animations ---------- */
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>

<body>
<div class="wrap">

  <header>
    <div class="ornament" aria-hidden="true">
      <span class="ornament-mark">Galerie</span>
    </div>
    <div class="monogram">Les souvenirs partagés</div>
    <h1 id="couple"><span class="first">Alice</span><span class="amp">&amp;</span><span class="second">Benoît</span></h1>
    <div class="date" id="date">20·06·2026</div>

    <div class="counter-wrap">
      <div class="counter" id="counter" aria-live="polite"></div>
    </div>

    <div class="actions">
      <a class="lnk solid" href="./index.html"><span class="ic">+</span> Ajouter mes photos</a>
      <button class="lnk refresh" id="refresh" type="button"><span class="ic">↻</span> Actualiser</button>
    </div>
  </header>

  <!-- États -->
  <div class="state" id="loading">
    <div class="spin-circle"></div>
    Chargement des souvenirs…
  </div>
  <div class="state hidden" id="empty">
    <span class="empty-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <circle cx="9" cy="11" r="1.6"/>
        <path d="m4 17 5-4 4 3 3-2 4 4"/>
      </svg>
    </span>
    Pas encore de souvenir partagé.
    <span class="small">Soyez le premier à glisser une photo dans l'album.</span>
  </div>
  <div class="state hidden" id="error">
    Impossible de charger la galerie.
    <span class="small" id="errDetail"></span>
    <br>
    <button class="lnk" id="retry" type="button" style="margin-top:16px"><span class="ic">↻</span> Réessayer</button>
  </div>

  <!-- Mosaïque -->
  <div class="grid hidden" id="grid"></div>

  <footer>
    Avec amour <span class="foot-ornament">·</span> <span id="footCouple">Alice &amp; Benoît</span>
  </footer>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" role="dialog" aria-label="Visionneuse">
  <div class="lb-top">
    <span class="lb-counter" id="lbCounter">1 <span class="total">/ 1</span></span>
    <button class="lb-close" id="lbClose" aria-label="Fermer">✕</button>
  </div>
  <button class="lb-btn lb-prev" id="lbPrev" aria-label="Précédent">‹</button>
  <div class="lb-media" id="lbMedia"></div>
  <button class="lb-btn lb-next" id="lbNext" aria-label="Suivant">›</button>
  <div class="lb-bottom">
    <a class="lb-dl" id="lbDl" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v12m-5-5 5 5 5-5M5 20h14"/></svg>
      Télécharger
    </a>
  </div>
</div>

<script>
/* ============================================================
   ⬇️⬇️⬇️  CONFIGURATION — doit correspondre à index.html  ⬇️⬇️⬇️
   ============================================================ */

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzFRQ6avQKyG3buRQ5WSvvo5yz45sOjAQNYQHfv1oEZaKod4XQAekVfki8XWvKVDRbthA/exec';

const COUPLE_FIRST  = 'Alice';
const COUPLE_SECOND = 'Benoît';
const WEDDING_DATE  = '20·06·2026';
const MONOGRAM      = 'A & B';

/* ============================================================
   ⬆️⬆️⬆️  FIN DE LA CONFIGURATION  ⬆️⬆️⬆️
   ============================================================ */

const couple = COUPLE_FIRST + ' & ' + COUPLE_SECOND;
document.querySelector('h1 .first').textContent  = COUPLE_FIRST;
document.querySelector('h1 .second').textContent = COUPLE_SECOND;
document.getElementById('footCouple').textContent = couple;
document.title = 'Galerie — ' + couple;

// Date avec petites pastilles décoratives
(function () {
  const el = document.getElementById('date');
  const parts = WEDDING_DATE.split(/[·.\-/\s]+/).filter(Boolean);
  if (parts.length === 3) {
    el.innerHTML = parts[0] + '<span class="dot"></span>' + parts[1] + '<span class="dot"></span>' + parts[2];
  } else {
    el.textContent = WEDDING_DATE;
  }
})();

const grid       = document.getElementById('grid');
const elLoading  = document.getElementById('loading');
const elEmpty    = document.getElementById('empty');
const elError    = document.getElementById('error');
const elCounter  = document.getElementById('counter');
const refreshBtn = document.getElementById('refresh');

let files = [];

function show(which) {
  elLoading.classList.toggle('hidden', which !== 'loading');
  elEmpty.classList.toggle('hidden',   which !== 'empty');
  elError.classList.toggle('hidden',   which !== 'error');
  grid.classList.toggle('hidden',      which !== 'grid');
}

function setCounter(n) {
  if (n <= 0) { elCounter.classList.remove('show'); elCounter.textContent = ''; return; }
  elCounter.innerHTML = '<strong>' + n + '</strong> ' +
    (n > 1 ? 'souvenirs partagés jusqu’ici' : 'souvenir partagé jusqu’ici');
  elCounter.classList.add('show');
}

/* ---------- Chargement de la liste ---------- */
async function load(isRefresh) {
  if (isRefresh) refreshBtn.classList.add('spinning');
  else show('loading');

  try {
    const resp = await fetch(WEB_APP_URL + '?action=list', { redirect: 'follow' });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Erreur serveur');

    // Galerie photos uniquement
    files = (data.files || [])
      .filter(f => (f.mimeType || '').indexOf('image/') === 0)
      .map(f => ({ id: f.id, name: f.name, mimeType: f.mimeType || '' }));

    if (files.length === 0) {
      setCounter(0);
      show('empty');
    } else {
      setCounter(files.length);
      render();
      show('grid');
    }
  } catch (err) {
    document.getElementById('errDetail').textContent = String(err.message || err);
    show('error');
  } finally {
    refreshBtn.classList.remove('spinning');
  }
}

/* ---------- Construction de la mosaïque ---------- */
function getColumnCount() {
  const w = window.innerWidth;
  if (w >= 920) return 4;
  if (w >= 620) return 3;
  return 2;
}

function buildTile(f, i) {
  const tile = document.createElement('button');
  tile.type = 'button';
  tile.className = 'tile';
  tile.style.animationDelay = Math.min(i * 50, 1600) + 'ms';
  tile.setAttribute('aria-label', 'Ouvrir ' + (f.name || 'photo'));
  tile.addEventListener('click', () => openLightbox(i));

  const img = document.createElement('img');
  img.loading = 'lazy';
  img.decoding = 'async';
  img.alt = f.name;
  img.src = thumbUrl(f.id, 600);
  img.dataset.fb = '0';
  img.addEventListener('load',  () => tile.classList.add('loaded'));
  img.addEventListener('error', () => onThumbError(img, f, tile));
  tile.appendChild(img);

  const dl = document.createElement('a');
  dl.className = 'dl';
  dl.href = downloadUrl(f.id);
  dl.target = '_blank';
  dl.rel = 'noopener';
  dl.setAttribute('download', f.name);
  dl.title = 'Télécharger';
  dl.setAttribute('aria-label', 'Télécharger cette photo');
  dl.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v12m-5-5 5 5 5-5M5 20h14"/></svg>';
  dl.addEventListener('click', (e) => e.stopPropagation());
  tile.appendChild(dl);

  return tile;
}

let currentColumns = 0;
function render(force) {
  const cols = getColumnCount();
  if (!force && cols === currentColumns && grid.childElementCount) return;
  currentColumns = cols;

  grid.innerHTML = '';
  const colEls = [];
  for (let c = 0; c < cols; c++) {
    const col = document.createElement('div');
    col.className = 'col';
    grid.appendChild(col);
    colEls.push(col);
  }
  // Round-robin : items 0,4,8… → col 0 ; 1,5,9… → col 1 ; etc.
  // Équilibre naturellement gauche/droite même avec un nombre d'items non multiple.
  files.forEach((f, i) => {
    colEls[i % cols].appendChild(buildTile(f, i));
  });
}

// Redistribue quand on change de breakpoint (ex: rotation, redimensionnement)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (files.length && getColumnCount() !== currentColumns) render(true);
  }, 180);
});

function thumbUrl(id, w) { return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w' + w; }
function fullUrl(id)     { return 'https://lh3.googleusercontent.com/d/' + id + '=w1920'; }
function downloadUrl(id) { return 'https://drive.google.com/uc?export=download&id=' + id; }

function onThumbError(img, f, tile) {
  const step = img.dataset.fb;
  if (step === '0') {
    img.dataset.fb = '1';
    img.src = 'https://lh3.googleusercontent.com/d/' + f.id + '=w600';
  } else {
    img.dataset.fb = '2';
    img.remove();
    const fb = document.createElement('div');
    fb.className = 'fb';
    fb.textContent = '✦ aperçu indisponible';
    tile.insertBefore(fb, tile.firstChild);
    tile.classList.add('loaded');
  }
}

/* ---------- Lightbox ---------- */
const lb       = document.getElementById('lb');
const lbMedia  = document.getElementById('lbMedia');
const lbCounter = document.getElementById('lbCounter');
const lbDl     = document.getElementById('lbDl');
let current = 0;

function openLightbox(i) {
  current = i;
  renderLightbox();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  lbMedia.innerHTML = '';
  document.body.style.overflow = '';
}
function step(d) {
  current = (current + d + files.length) % files.length;
  renderLightbox();
}
function renderLightbox() {
  const f = files[current];
  lbMedia.innerHTML = '<img alt="" src="' + fullUrl(f.id) + '">';
  lbCounter.innerHTML = (current + 1) + ' <span class="total">/ ' + files.length + '</span>';
  lbDl.href = downloadUrl(f.id);
  lbDl.setAttribute('download', f.name);
  // Préchargement des voisins pour navigation fluide
  preload((current + 1) % files.length);
  preload((current - 1 + files.length) % files.length);
}
function preload(i) {
  const f = files[i]; if (!f) return;
  const im = new Image();
  im.src = fullUrl(f.id);
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => step(-1));
document.getElementById('lbNext').addEventListener('click', () => step(1));
lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') step(-1);
  else if (e.key === 'ArrowRight') step(1);
});

/* ---------- Swipe gestures (mobile) ---------- */
let touchStartX = 0, touchStartY = 0, touchStartT = 0;
lbMedia.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartT = Date.now();
}, { passive: true });
lbMedia.addEventListener('touchend', (e) => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartT;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4 && dt < 600) {
    step(dx > 0 ? -1 : 1);
  } else if (dy > 90 && Math.abs(dy) > Math.abs(dx) * 1.4 && dt < 600) {
    closeLightbox();
  }
}, { passive: true });

refreshBtn.addEventListener('click', () => load(true));
document.getElementById('retry').addEventListener('click', () => load(false));

load(false);
</script>
